<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>שלב · יפן 2026</title>
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<style>
  #map { height:320px; border-radius:14px; overflow:hidden; z-index:0; margin-top:6px; }
  .leaflet-container { background:#0f1420; font-family:inherit; }
  .backlink { display:inline-flex; align-items:center; gap:6px; color:var(--blue); font-size:0.9rem; margin:4px 0 2px; }
  .st-when { color:var(--dim); font-size:0.9rem; }
  .st-nights { display:inline-block; background:var(--panel-2); border:1px solid var(--border); color:var(--muted);
    font-size:0.78rem; padding:2px 10px; border-radius:7px; margin-inline-start:8px; }
  .parked-note { background:rgba(242,183,5,0.12); border:1px solid rgba(242,183,5,0.35); color:var(--gold);
    border-radius:10px; padding:10px 13px; font-size:0.88rem; margin:10px 0; }
  .sec2 { margin:26px 0 10px; color:var(--accent); font-size:1.1rem; font-weight:700; border-bottom:1px solid var(--border); padding-bottom:6px; }
  .reg-h { margin:22px 0 8px; color:var(--ink); font-size:1rem; font-weight:700; }
  .day { background:var(--panel); border:1px solid var(--border); border-radius:14px; margin-bottom:12px; overflow:hidden; }
  .day-head { display:flex; align-items:center; gap:10px; padding:13px 15px; cursor:pointer; }
  .day-num { flex:none; background:var(--panel-2); border:1px solid var(--border); border-radius:8px; padding:3px 9px; font-size:0.78rem; font-weight:700; color:var(--muted); white-space:nowrap; }
  .day-title { flex:1; font-weight:600; font-size:1rem; }
  .day-chev { flex:none; color:var(--blue); font-size:0.8rem; }
  .day-body { display:none; padding:2px 15px 14px; }
  .day.open .day-body { display:block; }
  .day.open .day-chev { transform:rotate(180deg); }
  .act { display:flex; gap:11px; padding:10px 0; border-top:1px dashed var(--border); }
  .act-ic { flex:none; font-size:1.15rem; line-height:1.5; width:26px; text-align:center; }
  .act-main { flex:1; }
  .act-t { font-weight:600; font-size:0.92rem; }
  .act-d { color:var(--muted); font-size:0.84rem; line-height:1.55; margin-top:2px; }
  .act-cr { flex:none; font-size:0.9rem; }
  .act-links { display:flex; gap:7px; margin-top:6px; flex-wrap:wrap; }
  .act-links a { font-size:0.76rem; color:var(--blue); border:1px solid var(--border); background:var(--bg); padding:3px 9px; border-radius:7px; }
  .day-flag { background:rgba(242,183,5,0.12); border:1px solid rgba(242,183,5,0.35); color:var(--gold); border-radius:8px; padding:8px 11px; font-size:0.82rem; margin:10px 0 2px; }
  .legend2 { color:var(--muted); font-size:0.82rem; margin:2px 0 8px; }
  .nodays { color:var(--muted); font-size:0.9rem; background:var(--panel-2); border:1px dashed var(--border); border-radius:10px; padding:14px; text-align:center; }
</style>
</head>
<body>
<div class="topbar"><div class="wrap">
  <a class="tab" href="index.html">🏠 שער</a>
  <a class="tab" href="decisions.html">🧭 החלטות</a>
  <a class="tab active" href="itinerary.html">🗓️ מסלול</a>
  <a class="tab" href="documents.html">📂 מסמכים</a>
  <span class="brand">🍁 NIPON26</span>
</div></div>

<div class="wrap" style="padding-top:16px">
  <a class="backlink" href="itinerary.html">→ חזרה למסלול</a>
  <div id="head"></div>
</div>

<div class="wrap">
  <div id="mapWrap"></div>
  <div id="content"></div>
</div>

<footer>🍁 NIPON26 · שלב במסע 🍁</footer>
<script src="data.js"></script>
<script>
  const PHASE_COLORS=['#e94560','#f2b705','#4a9eda','#c084fc','#3ddc84','#ff8c42'];
  const s = parseInt(new URLSearchParams(location.search).get('s'));
  const phase = (TRIP.phases||[])[s];
  const head = document.getElementById('head');

  if(!phase){
    head.innerHTML = '<div class="nodays" style="margin-top:14px">שלב לא נמצא. <a href="itinerary.html" style="color:var(--blue)">חזרה למסלול</a></div>';
  } else {
    document.title = phase.h.replace(/·/,'·') + ' · יפן 2026';
    const parked = phase.parked ? `<div class="parked-note">❓ השלב הזה בסימן שאלה — לא בתוכנית הפעילה כרגע.</div>` : '';
    head.innerHTML = `<h1 style="font-size:1.9rem;margin-top:8px">${phase.h}</h1>`
      + `<div class="st-when">${phase.when}<span class="st-nights">${phase.nights}</span></div>`
      + parked
      + `<p style="color:var(--muted);margin-top:8px">${phase.p||''}</p>`;

    // ===== מפת השלב =====
    const pts = (TRIP.mapPoints||[]).filter(mp => mp.ph === s && !mp.overviewOnly);
    if(typeof L !== 'undefined' && pts.length){
      const mw = document.getElementById('mapWrap');
      mw.innerHTML = '<div class="sec2">🗺️ מפת השלב</div><div id="map"></div>';
      const map = L.map('map', { scrollWheelZoom:false });
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom:13, attribution:'© OpenStreetMap' }).addTo(map);
      const latlngs=[];
      pts.forEach(pt=>{ latlngs.push([pt.lat,pt.lng]);
        const gm = (typeof m==='function') ? m(pt.n+' Japan') : ('https://www.google.com/maps/search/'+encodeURIComponent(pt.n));
        L.circleMarker([pt.lat,pt.lng],{radius:8,color:'#fff',weight:1.5,fillColor:PHASE_COLORS[s%6],fillOpacity:0.95})
          .addTo(map).bindPopup(`<b>${pt.n}</b>${pt.d?'<br>'+pt.d:''}<br><a href="${gm}" target="_blank" rel="noopener">🗺️ פתח במפות</a>`);
      });
      if(pts.length>1){ L.polyline(latlngs,{color:PHASE_COLORS[s%6],weight:2,opacity:0.5,dashArray:'4 6'}).addTo(map); map.fitBounds(latlngs,{padding:[35,35]}); }
      else map.setView(latlngs[0],11);
    }

    // ===== יום-ביום של השלב =====
    const dphase = TRIP.dayPhase || {};
    const days = (TRIP.days||[]).filter(d => dphase[d.st] === s);
    const content = document.getElementById('content');
    if(!days.length){
      content.innerHTML = '<div class="sec2">📆 יום-ביום</div><div class="nodays">היום-ביום המפורט לשלב הזה יתווסף בהמשך. בינתיים — המפה והתיאור למעלה.</div>';
    } else {
      let html = '<div class="sec2">📆 יום-ביום</div><div class="legend2">עומק קהל: 🟢 מקומי · 🟡 מעורב · 🔴 תיירותי</div><div id="days"></div>';
      content.innerHTML = html;
      const wrap = document.getElementById('days');
      let lastReg = null;
      days.forEach(day => {
        if(day.st !== lastReg){ const h=document.createElement('div'); h.className='reg-h'; h.textContent=day.st; wrap.appendChild(h); lastReg=day.st; }
        const el = document.createElement('div'); el.className='day';
        const flag = day.flag ? `<div class="day-flag">${day.flag}</div>` : '';
        const acts = (day.acts||[]).map(a=>{
          const links = (a.l&&a.l.length) ? `<div class="act-links">${a.l.map(x=>`<a href="${x.u}" target="_blank" rel="noopener">${x.t}</a>`).join('')}</div>` : '';
          const d = a.d ? `<div class="act-d">${a.d}</div>` : '';
          const cr = a.cr ? `<span class="act-cr">${a.cr}</span>` : '';
          return `<div class="act"><span class="act-ic">${a.ic||'•'}</span><div class="act-main"><div class="act-t">${a.t}</div>${d}${links}</div>${cr}</div>`;
        }).join('');
        el.innerHTML = `<div class="day-head"><span class="day-num">${day.n}</span><span class="day-title">${day.t}</span><span class="day-chev">▾</span></div><div class="day-body">${flag}${acts}</div>`;
        el.querySelector('.day-head').addEventListener('click', ()=> el.classList.toggle('open'));
        wrap.appendChild(el);
      });
    }
  }
</script>
<script src="delight.js"></script>
</body>
</html>
