  TRIP.phases.forEach(p => {
    const el = document.createElement('div');
    el.className = 'phase';
    el.innerHTML = `<div class="ph-top"><h3>${p.h}</h3><span class="when">${p.when}</span></div>

    tl.appendChild(el);
